name: Release - Deploy to AWS
run-name: Release v${{ inputs.version }} to production

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version (semver, without the v prefix)
        required: true
        type: string
      prerelease:
        description: Publish as pre-release
        required: true
        default: false
        type: boolean

env:
  NODE_VERSION: "24"
  AWS_REGION: "us-east-1"

concurrency:
  group: release-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    name: Deploy and publish release
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 30
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Validate version format
        run: |
          set -euo pipefail

          VERSION='${{ inputs.version }}'

          if [[ ! "$VERSION" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?(\+[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$ ]]; then
            echo "::error::Invalid version format. Use semver, for example: 1.2.3 or 1.2.3-beta.1"
            exit 1
          fi

      - name: Check release tag does not already exist
        run: |
          set -euo pipefail

          TAG="v${{ inputs.version }}"

          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TAG already exists"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn

      - name: Restore Next.js cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('yarn.lock') }}-${{ hashFiles('**/*.[jt]s', '**/*.[jt]sx', '**/*.mjs', '**/*.cjs', 'next.config.*') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('yarn.lock') }}-

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build
        env:
          NODE_ENV: production
        run: yarn build

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy with Serverless
        env:
          CI: "true"
          SLS_INTERACTIVE_SETUP_ENABLE: "0"
        run: yarn serverless deploy --stage production --verbose

      - name: Invalidate CloudFront
        if: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID != '' }}
        env:
          CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          set -euo pipefail

          aws cloudfront create-invalidation \
            --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" \
            --paths '/*'

      - name: Create and push tag
        run: |
          set -euo pipefail

          TAG="v${{ inputs.version }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          TAG="v${{ inputs.version }}"
          EXTRA_ARGS=()

          if [[ "${{ inputs.prerelease }}" == "true" ]]; then
            EXTRA_ARGS+=(--prerelease)
          fi

          gh release create "$TAG" \
            --verify-tag \
            --title "$TAG" \
            --generate-notes \
            --fail-on-no-commits \
            "${EXTRA_ARGS[@]}"
